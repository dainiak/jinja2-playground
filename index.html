<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="www.dainiak.com">
    <meta name="description" content="Debug jinja2 templates in your browser.">

    <title>Jinja2 Playground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css" integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js" integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.3/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.min.js" integrity="sha512-BHJlu9vUXVrcxhRwbBdNv3uTsbscp8pp3LJ5z/sw9nBJUegkNlkcZnvODRgynJWhXMCsVUGZlFuzTrr5I2X3sQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js" integrity="sha512-g2TeAWw5GPnX7z0Kn8nFbYfeHcvAu/tx6d6mrLe/90mkCxO+RcptyYpksUz35EO337F83bZwcmUyHiHamspkfg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
<div id="loader"><h1>Loading… Takes about 2—9 seconds.</h1><div class="spinner-border text-light mt-3" role="status"><span class="visually-hidden">Loading...</span></div></div>

<div id="main" class="container-fluid mt-3 d-flex flex-column" style="height: calc(100dvh - 1rem);">
    <div class="row flex-fill" style="min-height: 0;">
        <div class="col-md-6 d-flex flex-column" style="min-height: 0;">
            <div class="left-col-container d-flex flex-column" style="min-height: 0;">
                <h3>Template</h3>
                <div id="env-options" class="d-flex gap-3 mb-1">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="opt-trim-blocks">
                        <label class="form-check-label small" for="opt-trim-blocks">trim_blocks</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="opt-lstrip-blocks">
                        <label class="form-check-label small" for="opt-lstrip-blocks">lstrip_blocks</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="opt-keep-trailing-newline">
                        <label class="form-check-label small" for="opt-keep-trailing-newline">keep_trailing_newline</label>
                    </div>
                </div>
                <div id="template"></div>
            </div>
            <div class="left-col-container d-flex flex-column" style="min-height: 0;">
                <h3 class="mt-3">Variables (as Python dict)</h3>
                <div id="variables"></div>
            </div>
        </div>
        <div class="col-md-6 d-flex flex-column" style="min-height: 0;">

            <div class="d-flex flex-row justify-content-between">
                <h3>Output</h3>
                <a id="sharinglink" href="#">Link to the current view</a>&nbsp;
                <button id="copybutton" class="btn btn-outline-secondary"><i id="copyicon" class="fa fa-clipboard"></i><i id="copiedicon" style="display: none" class="fa fa-check"></i></button>
            </div>
            <div id="output" class="flex-fill-custom"></div>
        </div>
    </div>
</div>

<script type="module" src="./src/loader.js"></script>
</body>
</html>
